<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monday BI Agent</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 20px; background: #f4f7f9; }
        .container { max-width: 800px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; }
        .chat-box { border: 1px solid #ddd; padding: 15px; height: 400px; overflow-y: auto; margin-bottom: 20px; border-radius: 8px; }
        .input-group { display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 12px 20px; background: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #2980b9; }
        .message { margin-bottom: 15px; }
        .user { font-weight: bold; color: #2980b9; }
        .agent { font-weight: bold; color: #27ae60; }
        .trace { font-size: 0.85em; color: #7f8c8d; margin-top: 5px; padding-left: 10px; border-left: 2px solid #ddd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Monday BI Agent</h1>
        <div class="chat-box" id="chat"></div>
        <div class="input-group">
            <input type="text" id="userInput" placeholder="Ask about your Work Orders or Deals...">
            <button onclick="sendQuery()">Ask</button>
        </div>
    </div>

    <script>
        async function sendQuery() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const question = input.value;
            if (!question) return;

            chat.innerHTML += `<div class="message"><span class="user">You:</span> ${question}</div>`;
            input.value = '';

            try {
                const response = await fetch('http://localhost:8000/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    json: { message: question, history: [] }
                });
                const data = await response.json();
                
                let traceHtml = data.trace.map(t => `<div><b>${t.step}:</b> ${t.description}</div>`).join('');
                chat.innerHTML += `<div class="message">
                    <span class="agent">Agent:</span> ${data.answer}
                    <div class="trace">${traceHtml}</div>
                </div>`;
            } catch (error) {
                chat.innerHTML += `<div class="message"><span class="agent">Error:</span> Could not connect to the backend.</div>`;
            }
            chat.scrollTop = chat.scrollHeight;
        }
    </script>
</body>
</html>
